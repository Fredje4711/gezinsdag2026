<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gezinsdag 2026 - Fotogalerij</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: sans-serif; }

        /* GRID */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 100%; height: 100%; gap: 15px; padding: 15px; }
        .photo-slot { position: relative; width: 100%; height: 100%; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 4px; cursor: pointer; position: absolute; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease, filter 0.8s ease; z-index: 1; }
        .grid-container.has-active .photo-slot img:not(.active) { opacity: 0.80; filter: brightness(80%) blur(2px); }
        .photo-slot img.active { object-fit: contain !important; z-index: 9999 !important; opacity: 1 !important; box-shadow: 0 0 100px #000; }

        /* BEDIENING ONDERAAN */
        .action-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; gap: 15px; align-items: center; }
        .btn-ui { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 13px; text-transform: uppercase; text-decoration: none; }
        .btn-info { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.5); color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* MODALS (STOP MENU & INFO) */
        #stopMenu, #infoModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 20000; flex-direction: column; justify-content: center; align-items: center; gap: 20px; color: white; }
        .info-content { background: #1a1a1a; padding: 30px; border-radius: 15px; max-width: 350px; text-align: center; border: 1px solid #333; }

        /* --- VERBETERDE LIGHTBOX --- */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 30000; flex-direction: column; }
        
        /* Balk bovenaan voor knoppen zodat ze nooit verdwijnen */
        .lb-top-bar { width: 100%; padding: 20px; display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.6); z-index: 30010; }
        
        .lb-image-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }
        #lbImg { max-width: 100%; max-height: 100%; border: 1px solid #444; border-radius: 4px; object-fit: contain; }

        .btn-danger { border-color: #ff6464; color: #ff8888; }
    </style>
</head>
<body>

    <div class="action-bar">
        <button class="btn-info" onclick="toonInfo()">i</button>
        <button class="btn-ui" onclick="pauzeer()">Stop</button>
        <button class="btn-ui" onclick="herstarten()">Herstarten</button>
    </div>

    <div id="stopMenu">
        <h2 id="menuStatus">Presentatie Gepauzeerd</h2>
        <button class="btn-ui" onclick="doorgaan()">Doorgaan</button>
        <button class="btn-ui" onclick="herstarten()">Opnieuw Beginnen</button>
        <button class="btn-ui btn-danger" onclick="volledigStoppen()">Volledig Stoppen</button>
    </div>

    <div id="infoModal" onclick="sluitInfo()">
        <div class="info-content">
            <h3>Informatie</h3>
            <p>Klik op een foto in het overzicht om deze te downloaden.</p>
            <button class="btn-ui">Sluiten</button>
        </div>
    </div>

    <!-- LIGHTBOX MET VASTE BALK BOVENAAN -->
    <div id="lightbox">
        <div class="lb-top-bar">
            <button class="btn-ui" onclick="forceerDownload()">Download Foto</button>
            <button class="btn-ui" onclick="sluitLightbox()">Terug naar overzicht</button>
        </div>
        <div class="lb-image-container">
            <img id="lbImg" src="">
        </div>
    </div>

    <div id="gallery-container" class="grid-container"></div>

    <script>
    const photos = [];
    const baseName = "Gezinsdag 2026";
    const totaalAantalFotos = 19; 
    let activeUrl = ""; 

    for(let i = 1; i <= totaalAantalFotos; i++) {
        photos.push(`images/${baseName}_${i}.jpg`);
    }

    let currentSetIndex = 0;
    let currentPhotoIndex = 0;
    let isPaused = false;
    let timer; 
    const gallery = document.getElementById('gallery-container');

    function loadGrid(startIndex) {
        clearTimeout(timer);
        gallery.innerHTML = '';
        const set = photos.slice(startIndex, startIndex + 9);
        set.forEach((url, i) => {
            const slot = document.createElement('div');
            slot.className = 'photo-slot';
            slot.innerHTML = `<img src="${url}" id="img-${i}" onclick="openLightbox('${url}')">`;
            gallery.appendChild(slot);
        });
        currentPhotoIndex = 0;
        if (!isPaused) { timer = setTimeout(startAnimatieRonde, 500); }
    }

    async function startAnimatieRonde() {
        if (isPaused) return;
        const imgs = document.querySelectorAll('.photo-slot img');
        if (currentPhotoIndex >= imgs.length) {
            currentSetIndex += 9;
            if (currentSetIndex >= photos.length) currentSetIndex = 0;
            loadGrid(currentSetIndex);
            return;
        }
        const img = imgs[currentPhotoIndex];
        if (!img) return;
        const rect = img.getBoundingClientRect();
        const moveX = (window.innerWidth / 2) - (rect.left + rect.width / 2);
        const moveY = (window.innerHeight / 2) - (rect.top + rect.height / 2);
        const scale = Math.min((window.innerWidth * 0.96) / rect.width, (window.innerHeight * 0.96) / rect.height);
        gallery.classList.add('has-active');
        img.parentElement.style.zIndex = "1000"; 
        img.classList.add('active');
        img.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;
        timer = setTimeout(() => {
            img.style.transform = `translate(0, 0) scale(1)`;
            gallery.classList.remove('has-active');
            timer = setTimeout(() => {
                img.classList.remove('active');
                img.parentElement.style.zIndex = "1"; 
                currentPhotoIndex++; 
                startAnimatieRonde();
            }, 1600);
        }, 4000);
    }

    function pauzeer() {
        isPaused = true;
        clearTimeout(timer);
        const activeImg = document.querySelector('.photo-slot img.active');
        if (activeImg) {
            activeImg.style.transform = `translate(0, 0) scale(1)`;
            activeImg.classList.remove('active');
            activeImg.parentElement.style.zIndex = "1";
            gallery.classList.remove('has-active');
        }
        document.getElementById('stopMenu').style.display = 'flex';
    }

    function doorgaan() {
        isPaused = false;
        document.getElementById('stopMenu').style.display = 'none';
        startAnimatieRonde();
    }

    function herstarten() {
        isPaused = false;
        clearTimeout(timer);
        document.getElementById('stopMenu').style.display = 'none';
        currentSetIndex = 0;
        currentPhotoIndex = 0;
        loadGrid(0);
    }

    function volledigStoppen() {
        window.close();
        document.getElementById('menuStatus').innerHTML = "Beëindigd.<br><small>Sluit dit tabblad handmatig.</small>";
        document.querySelectorAll('#stopMenu button:not(.btn-danger)').forEach(b => b.style.display = 'none');
        setTimeout(() => { window.location.href = "https://www.google.com"; }, 4000);
    }

    function toonInfo() { document.getElementById('infoModal').style.display = 'flex'; }
    function sluitInfo() { document.getElementById('infoModal').style.display = 'none'; }

    function openLightbox(url) {
        pauzeer(); 
        document.getElementById('stopMenu').style.display = 'none'; 
        activeUrl = url;
        document.getElementById('lbImg').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function sluitLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.getElementById('stopMenu').style.display = 'flex'; 
    }

    // --- DE ULTIEME DOWNLOAD FIX ---
    async function forceerDownload() {
        try {
            const response = await fetch(activeUrl);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = activeUrl.split('/').pop();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
            // Fallback als fetch niet mag (lokaal)
            const link = document.createElement('a');
            link.href = activeUrl;
            link.download = activeUrl.split('/').pop();
            link.target = "_blank";
            link.click();
        }
    }

    loadGrid(0);
    </script>
</body>
</html>
